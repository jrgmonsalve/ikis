name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy AWS stack
    runs-on: ubuntu-latest
    env:
      TF_VAR_project_name: ${{ vars.PROJECT_NAME || 'expense-control' }}
      TF_VAR_environment: ${{ vars.ENVIRONMENT || 'dev' }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
      TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
      TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      TF_VAR_callback_urls: ${{ secrets.COGNITO_CALLBACK_URLS }}
      TF_VAR_logout_urls: ${{ secrets.COGNITO_LOGOUT_URLS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19"

      - name: Build backend packages
        run: |
          npm install
          npm test
          npm run build
        working-directory: backend

      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Apply infrastructure
        run: |
          terraform init
          terraform apply -auto-approve -input=false
          terraform output -json > outputs.json
        working-directory: infra

      - name: Build frontend
        run: |
          export API_BASE_URL=$(jq -r '.api_url.value' ../infra/outputs.json)
          export AWS_REGION="${TF_VAR_aws_region}"
          export COGNITO_USER_POOL_ID=$(jq -r '.user_pool_id.value' ../infra/outputs.json)
          export COGNITO_APP_CLIENT_ID=$(jq -r '.user_pool_client_id.value' ../infra/outputs.json)
          export COGNITO_HOSTED_UI_URL=$(jq -r '.cognito_hosted_ui_base_url.value' ../infra/outputs.json)
          npm install
          npm run write-env
          npm run build
        working-directory: frontend

      - name: Upload frontend to S3
        run: |
          BUCKET_NAME=$(jq -r '.frontend_bucket_name.value' ../infra/outputs.json)
          aws s3 sync dist/expense-control-frontend/browser "s3://${BUCKET_NAME}" --delete
        working-directory: frontend

      - name: Invalidate CloudFront
        run: |
          DISTRIBUTION_ID=$(jq -r '.cloudfront_distribution_id.value' outputs.json)
          aws cloudfront create-invalidation --distribution-id "${DISTRIBUTION_ID}" --paths "/*"
        working-directory: infra
