name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            functions/package-lock.json
            tests/firestore/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_IKIS_5FED9 }}

      - name: Install dependencies
        run: |
          npm ci --prefix apps/web
          npm ci --prefix functions
          npm ci --prefix tests/firestore

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Functions lint
        run: npm run lint:functions

      - name: Frontend tests
        run: npm run test:web

      - name: Firestore rules tests
        run: npm run test:rules

      - name: Build
        run: npm run build

      - name: Deploy Firebase
        run: firebase deploy --project ikis-5fed9 --only hosting,functions,firestore:rules,firestore:indexes
